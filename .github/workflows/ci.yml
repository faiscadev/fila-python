name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy fila/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - uses: actions/checkout@v4
        with:
          repository: faiscadev/fila
          path: _server
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            _server/target
            ~/.cargo/registry
            ~/.cargo/git
          key: fila-server-${{ runner.os }}-${{ hashFiles('_server/Cargo.lock') }}
          restore-keys: fila-server-${{ runner.os }}-
      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo build --release -p fila-server --manifest-path _server/Cargo.toml
      - run: python -m pytest tests/ -v
        env:
          FILA_SERVER_BIN: ${{ github.workspace }}/_server/target/release/fila-server
