name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy fila/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - uses: actions/checkout@v4
        with:
          repository: faiscadev/fila
          path: fila
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            fila/target
            ~/.cargo/registry
            ~/.cargo/git
          key: fila-server-${{ runner.os }}-${{ hashFiles('fila/Cargo.lock') }}
          restore-keys: fila-server-${{ runner.os }}-
      - run: cargo build --release -p fila-server --manifest-path fila/Cargo.toml
      - run: python -m pytest tests/ -v
        env:
          FILA_SERVER_BIN: ${{ github.workspace }}/fila/target/release/fila-server
